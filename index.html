<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Magazzino DB" />
  <meta name="theme-color" content="#13110f" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
  <title>Magazzino — Deposito Bagagli</title>
</head>
<body>

<div id="app" x-data="app" x-cloak class="app" :class="{ 'admin-on': adminUnlocked }">

  <!-- ============ TOPBAR ============ -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <span><span class="pin">M</span>agazzino</span>
        <template x-if="adminUnlocked">
          <em style="font-size:0.5em;letter-spacing:3px;text-transform:uppercase;color:var(--admin);margin-left:8px;">admin</em>
        </template>
      </div>
      <span class="brand-rule"></span>
      <span class="brand-date" x-text="todayLabel.toUpperCase()"></span>
    </div>

    <div class="spacer"></div>

    <!-- Ricerca prodotti -->
    <template x-if="!setupMode">
      <div class="topsearch">
        <span class="ico">⌕</span>
        <input type="search" placeholder="cerca prodotto…"
               x-model="searchQuery"
               @focus="searchOpen = true"
               @blur="setTimeout(() => searchOpen = false, 200)" />
        <div class="search-results" x-show="searchOpen && searchResults.length > 0">
          <template x-for="r in searchResults" :key="r.id">
            <div class="res" @mousedown.prevent="pickSearchResult(r)" @touchstart.prevent="pickSearchResult(r)">
              <span class="name" x-text="r.name"></span>
              <small>
                <span x-text="(categoryById(r.category)?.name || '').toUpperCase()"></span>
                · <span x-text="r.currentStock + ' ' + r.unit"></span>
              </small>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Pill timer admin + esci, quando sbloccato -->
    <template x-if="adminUnlocked">
      <div class="flex-row">
        <span class="timeout-pill" x-text="`${adminRemainingSec}s`"></span>
        <button class="btn small ghost" @click="exitAdmin()">Esci admin</button>
      </div>
    </template>

    <!-- Tema -->
    <button class="theme-toggle" @click="toggleTheme()"
            :title="theme === 'dark' ? 'Tema chiaro' : 'Tema scuro'">
      <span x-show="theme === 'dark'">☀</span>
      <span x-show="theme === 'light'" style="font-size:16px">☾</span>
    </button>

    <!-- Lock admin: visibile solo se non sbloccato -->
    <template x-if="!adminUnlocked">
      <button class="admin-lock" @click="openPinLogin()" :disabled="setupMode" title="Sblocca admin">⚿</button>
    </template>
  </header>

  <!-- ============ RAIL: categorie ============ -->
  <nav class="rail">
    <div class="rail-section">Categorie</div>
    <template x-for="cat in categories" :key="cat.id">
      <button class="rail-item"
              :class="{ active: view === 'products' && productView === 'cards' && cat.id === activeCategory }"
              @click="view = 'products'; productView = 'cards'; activeCategory = cat.id">
        <span class="ico" x-text="cat.icon"></span>
        <span class="lbl" x-text="cat.name"></span>
        <template x-if="countLowByCategory[cat.id] > 0">
          <span class="badge" x-text="countLowByCategory[cat.id]"></span>
        </template>
      </button>
    </template>
  </nav>

  <!-- ============ MAIN ============ -->
  <main class="content">

    <!-- Tab bar: 4 viste sempre visibili + Impostazioni se admin -->
    <div class="viewtabs">
      <button class="viewtab" :class="{ active: view === 'products' }" @click="view = 'products'">
        <span class="ico">📦</span><span>Prodotti</span>
      </button>
      <button class="viewtab" :class="{ active: view === 'storico' }" @click="view = 'storico'">
        <span class="ico">📅</span><span>Storico</span>
      </button>
      <button class="viewtab" :class="{ active: view === 'avvisi' }" @click="view = 'avvisi'">
        <span class="ico">⚠</span><span>Avvisi</span>
        <template x-if="countLow > 0">
          <span class="vt-badge" x-text="countLow"></span>
        </template>
      </button>
      <button class="viewtab" :class="{ active: view === 'fornitori' }" @click="view = 'fornitori'">
        <span class="ico">🚚</span><span>Fornitori</span>
      </button>
      <template x-if="adminUnlocked">
        <button class="viewtab admin" :class="{ active: view === 'impostazioni' }" @click="view = 'impostazioni'">
          <span class="ico">⚙</span><span>Impostazioni</span>
        </button>
      </template>
    </div>

    <!-- Day strip: solo nella vista Prodotti -->
    <template x-if="view === 'products'">
      <div class="daystrip">
        <div class="daystrip-item date">
          <div class="lbl">Oggi</div>
          <div class="val" x-text="todayLabelShort"></div>
        </div>
        <div class="daystrip-item">
          <div class="lbl">Uscite oggi</div>
          <div class="val" x-text="todayStats.out"></div>
        </div>
        <div class="daystrip-item ok">
          <div class="lbl">Ingressi oggi</div>
          <div class="val" x-text="todayStats.in"></div>
        </div>
        <div class="daystrip-item warn">
          <div class="lbl">Sotto soglia</div>
          <div class="val" x-text="countLow"></div>
        </div>
        <button class="btn-close-day" @click="askCloseDay()" title="Registra la giornata">
          <span>Chiudi giornata</span>
          <span class="arrow">→</span>
        </button>
      </div>
    </template>

    <!-- ====== VISTA: PRODOTTI ====== -->
    <template x-if="view === 'products'">
      <div>
        <!-- Toolbar superiore: switch Card/Lista + azioni -->
        <div class="toolbar" style="padding:18px 26px 8px;">
          <div class="view-switch">
            <button class="vs-btn" :class="{ active: productView === 'cards' }" @click="productView = 'cards'">📦 Card</button>
            <button class="vs-btn" :class="{ active: productView === 'list' }" @click="productView = 'list'">📋 Lista totale</button>
          </div>
          <button class="btn primary" @click="openNewProduct()">+ Nuovo prodotto</button>
          <button class="btn" @click="openCategoryManager()">✏ Gestisci categorie</button>
        </div>

        <!-- === MODALITÀ CARD: griglia per categoria === -->
        <template x-if="productView === 'cards'">
          <div>
            <div class="section-title">
              <h2>
                <span x-text="activeCategoryObj?.icon"></span>
                <em x-text="activeCategoryObj?.name"></em>
              </h2>
              <span class="meta">
                <span x-text="visibleProducts.length"></span>
                <span x-text="visibleProducts.length === 1 ? 'prodotto' : 'prodotti'"></span>
              </span>
              <div class="rule"></div>
              <template x-if="visibleLowCount > 0">
                <span class="alert-tag">⚠ <span x-text="visibleLowCount"></span> sotto soglia</span>
              </template>
            </div>

            <template x-if="countLow > 0 && countLow > visibleLowCount">
              <div class="urgent-bar">
                <span class="sym">!!</span>
                <span class="lbl">Altri prodotti urgenti in altre categorie</span>
                <span class="ct" x-text="(countLow - visibleLowCount) + ' alert'"></span>
                <a class="more" @click="jumpToFirstLow()">vedi →</a>
              </div>
            </template>

            <template x-if="visibleProducts.length === 0">
              <div class="empty">— nessun prodotto in questa categoria —</div>
            </template>
            <div class="grid" x-show="visibleProducts.length > 0">
              <template x-for="(prod, i) in visibleProducts" :key="prod.id">
                <div class="card"
                     :class="{ low: isLow(prod), 'pulse-minus': pulseState[prod.id] === 'minus', 'pulse-plus': pulseState[prod.id] === 'plus' }"
                     :style="`--reveal-delay: ${Math.min(i, 24) * 25}ms`">
                  <template x-if="isLow(prod)"><div class="card-warn">!</div></template>

                  <button class="card-edit" @click.stop="openEditProduct(prod)" title="Modifica prodotto">✎</button>

                  <div class="card-info" @click="openQty(prod, 'out')">
                    <div class="card-cat" x-text="categoryById(prod.category)?.name"></div>
                    <div class="card-name" x-text="prod.name"></div>
                    <template x-if="adminUnlocked && (prod.costPrice > 0 || prod.salePrice > 0)">
                      <div class="card-prices">
                        <span><em>cost.</em> <span x-text="formatPrice(prod.costPrice)"></span></span>
                        <span><em>vend.</em> <span x-text="formatPrice(prod.salePrice)"></span></span>
                      </div>
                    </template>
                    <div class="card-stock-area">
                      <span class="card-stock"
                            :class="{ low: isLow(prod), zero: prod.currentStock <= 0 }"
                            x-text="prod.currentStock"></span>
                      <span class="card-unit" x-text="prod.unit"></span>
                    </div>
                  </div>

                  <div class="card-actions">
                    <button class="card-act minus" @click="openQty(prod, 'out')" :disabled="prod.currentStock <= 0">
                      <span class="sym">−</span>
                      <small>uscita</small>
                    </button>
                    <button class="card-act plus" @click="openQty(prod, 'in')">
                      <span class="sym">+</span>
                      <small>ingresso</small>
                    </button>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- === MODALITÀ LISTA TOTALE: tutti i prodotti raggruppati per categoria === -->
        <template x-if="productView === 'list'">
          <div style="padding: 6px 24px 100px;">
            <template x-if="inventoryList.length === 0">
              <div class="empty">Nessun prodotto in inventario.</div>
            </template>
            <template x-for="g in inventoryList" :key="g.category.id">
              <div class="section">
                <h2 style="margin: 18px 0 10px; display:flex; align-items:baseline; gap:10px;">
                  <span x-text="g.category.icon"></span>
                  <em x-text="g.category.name"></em>
                  <span class="muted" style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.5px;">
                    <span x-text="g.rows.length"></span> ·
                    <span x-text="g.rows.filter(r => isLow(r)).length"></span> sotto soglia
                  </span>
                </h2>
                <div class="row-list">
                  <div class="row head" style="grid-template-columns: 2.5fr 1fr 1fr auto;">
                    <div>Prodotto</div>
                    <div>Scorta</div>
                    <div class="col-hide-sm">Soglia</div>
                    <div></div>
                  </div>
                  <template x-for="prod in g.rows" :key="prod.id">
                    <div class="row" :class="{ danger: isLow(prod) }" style="grid-template-columns: 2.5fr 1fr 1fr auto;">
                      <div class="name">
                        <span x-text="prod.name"></span>
                        <template x-if="isLow(prod)"><span class="alert-tag" style="font-size:10px;padding:1px 7px;margin-left:8px;">⚠</span></template>
                      </div>
                      <div :style="isLow(prod) ? 'color:var(--terra);font-weight:700' : 'font-weight:600'">
                        <span x-text="prod.currentStock"></span>
                        <span class="muted" style="font-size:11px" x-text="' ' + prod.unit"></span>
                      </div>
                      <div class="muted col-hide-sm" x-text="prod.minThreshold"></div>
                      <div>
                        <button class="btn small" @click="openEditProduct(prod)" title="Modifica">✎</button>
                        <button class="btn small danger" @click="openQty(prod, 'out')" :disabled="prod.currentStock <= 0" title="Uscita">−</button>
                        <button class="btn small ok" @click="openQty(prod, 'in')" title="Ingresso">+</button>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>

    <!-- ====== VISTA: STORICO (per sessioni di chiusura) ====== -->
    <template x-if="view === 'storico'">
      <div style="padding: 22px 24px 80px;">
        <div class="section-title" style="padding:0 0 14px;">
          <h2><span>📅</span> <em>Storico per chiusure</em></h2>
          <span class="meta">
            <span x-text="historySessions.length"></span>
            <span x-text="historySessions.length === 1 ? 'sessione' : 'sessioni'"></span>
          </span>
          <div class="rule"></div>
        </div>
        <p class="muted" style="padding:0 4px 14px">Ogni voce è una sessione tra due chiusure di giornata. Tap per espandere e vedere i movimenti.</p>

        <div class="toolbar">
          <select x-model="historyProductFilter">
            <option value="">Tutti i prodotti</option>
            <template x-for="p in allActiveProducts" :key="p.id">
              <option :value="p.id" x-text="p.name"></option>
            </template>
          </select>
          <button class="btn" @click="exportMovementsCsv()">⬇ Esporta tutto CSV</button>
        </div>

        <template x-if="historySessions.length === 0">
          <div class="empty">Nessuna sessione registrata.</div>
        </template>

        <template x-for="s in historySessions" :key="s.id">
          <div class="session-card" :class="{ open: expandedSessions[s.id], current: s.isCurrent }">
            <button class="session-head" @click="toggleSession(s.id)">
              <span class="session-chev" x-text="expandedSessions[s.id] ? '▾' : '▸'"></span>
              <div class="session-title">
                <div class="session-date">
                  <template x-if="s.isCurrent"><span class="session-pill">in corso</span></template>
                  <span x-text="s.label"></span>
                </div>
                <div class="session-sub muted" x-text="s.sublabel"></div>
              </div>
              <div class="session-stats">
                <span class="ss out"><em>↓</em><span x-text="s.out"></span></span>
                <span class="ss in"><em>↑</em><span x-text="s.in"></span></span>
                <span class="ss neutral"><em>mov.</em><span x-text="s.movementCount"></span></span>
                <template x-if="s.lowCount != null && s.lowCount > 0">
                  <span class="ss warn"><em>⚠</em><span x-text="s.lowCount"></span></span>
                </template>
              </div>
            </button>

            <template x-if="expandedSessions[s.id]">
              <div class="session-body">
                <template x-if="s.movements.length === 0">
                  <div class="empty" style="padding:24px">Nessun movimento in questa sessione.</div>
                </template>
                <template x-if="s.movements.length > 0">
                  <div class="row-list">
                    <div class="row head" style="grid-template-columns: 1.4fr 2fr 1fr 1fr 1fr 1fr auto;">
                      <div>Data</div>
                      <div>Prodotto</div>
                      <div>Tipo</div>
                      <div>Prima</div>
                      <div>Cambio</div>
                      <div>Dopo</div>
                      <div></div>
                    </div>
                    <template x-for="mv in s.movements" :key="mv.id">
                      <div class="row" style="grid-template-columns: 1.4fr 2fr 1fr 1fr 1fr 1fr auto;">
                        <div class="muted" x-text="formatTimestamp(mv.timestamp)"></div>
                        <div class="name" x-text="mv.productName"></div>
                        <div :class="{ danger: mv.type === 'out', ok: mv.type === 'in' }"
                             x-text="mv.type === 'out' ? '↓ uscita' : mv.type === 'in' ? '↑ ingresso' : '✎ rettifica'"></div>
                        <div class="muted" x-text="(mv.stockAfter - mv.delta)"></div>
                        <div :style="mv.delta >= 0 ? 'color:var(--sage);font-weight:700' : 'color:var(--terra);font-weight:700'"
                             x-text="(mv.delta >= 0 ? '+' : '') + mv.delta"></div>
                        <div style="font-weight:700" x-text="mv.stockAfter"></div>
                        <div><button class="btn small danger" @click="deleteMovement(mv)">Annulla</button></div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>

    <!-- ====== VISTA: AVVISI ====== -->
    <template x-if="view === 'avvisi'">
      <div style="padding: 22px 24px 80px;">
        <div class="section">
          <h2>Prodotti sotto soglia</h2>
          <p class="muted" x-text="countLow === 0 ? 'Tutto a posto: nessun prodotto sotto soglia.' : `${countLow} prodotti richiedono attenzione.`"></p>
        </div>
        <div class="row-list" x-show="countLow > 0">
          <div class="row head">
            <div>Prodotto</div>
            <div class="col-hide-sm">Categoria</div>
            <div>Scorta</div>
            <div class="col-hide-sm">Soglia</div>
            <div></div>
          </div>
          <template x-for="prod in lowStockProducts" :key="prod.id">
            <div class="row danger">
              <div class="name" x-text="prod.name"></div>
              <div class="muted col-hide-sm" x-text="categoryById(prod.category)?.name || ''"></div>
              <div x-text="prod.currentStock + ' ' + prod.unit"></div>
              <div class="col-hide-sm" x-text="prod.minThreshold"></div>
              <div><button class="btn small primary" @click="openQty(prod, 'in')">Rifornisci</button></div>
            </div>
          </template>
        </div>

        <div class="section" style="margin-top:32px;">
          <div class="flex-row">
            <h2 class="no-margin" style="flex:1">Lista della spesa</h2>
            <button class="btn primary" @click="exportShoppingList()" :disabled="countLow === 0">⬇ Esporta CSV</button>
          </div>
          <p class="muted">Prodotti sotto soglia, raggruppati per fornitore. Quantità suggerita = 2× soglia minima.</p>
        </div>
        <template x-if="countLow === 0">
          <div class="empty">Nessun prodotto sotto soglia.</div>
        </template>
        <template x-for="(items, supplierName) in shoppingList" :key="supplierName">
          <div class="section">
            <h2 style="font-size:15px;color:var(--accent);font-style:italic;" x-text="supplierName"></h2>
            <div class="row-list">
              <div class="row head" style="grid-template-columns: 2fr 1fr 1fr 1fr;">
                <div>Prodotto</div>
                <div>Scorta</div>
                <div>Soglia</div>
                <div>Da ordinare</div>
              </div>
              <template x-for="it in items" :key="it.productId">
                <div class="row" style="grid-template-columns: 2fr 1fr 1fr 1fr;">
                  <div class="name" x-text="it.productName"></div>
                  <div x-text="it.currentStock + ' ' + it.unit"></div>
                  <div x-text="it.minThreshold"></div>
                  <div style="font-family:var(--font-mono);font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;" x-text="it.toOrder + ' ' + it.unit"></div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- ====== VISTA: FORNITORI ====== -->
    <template x-if="view === 'fornitori'">
      <div style="padding: 22px 24px 80px;">
        <div class="section">
          <div class="flex-row">
            <h2 class="no-margin" style="flex:1">Fornitori</h2>
            <button class="btn primary" @click="openNewSupplier()">+ Nuovo fornitore</button>
          </div>
        </div>
        <div class="row-list">
          <div class="row head" style="grid-template-columns: 2fr 1fr 1fr auto;">
            <div>Nome</div>
            <div class="col-hide-sm">Telefono</div>
            <div class="col-hide-sm">Email</div>
            <div></div>
          </div>
          <template x-for="s in suppliers" :key="s.id">
            <div class="row" style="grid-template-columns: 2fr 1fr 1fr auto;">
              <div class="name" x-text="s.name"></div>
              <div class="col-hide-sm muted" x-text="s.phone || '—'"></div>
              <div class="col-hide-sm muted" x-text="s.email || '—'"></div>
              <div class="flex-row">
                <button class="btn small" @click="openEditSupplier(s)">Modifica</button>
                <button class="btn small danger" @click="deleteSupplier(s)">Elimina</button>
              </div>
            </div>
          </template>
          <template x-if="suppliers.length === 0">
            <div class="empty">Nessun fornitore inserito.</div>
          </template>
        </div>
      </div>
    </template>

    <!-- ====== VISTA: IMPOSTAZIONI (solo admin) ====== -->
    <template x-if="view === 'impostazioni' && adminUnlocked">
      <div style="padding: 22px 24px 80px;">
        <template x-if="showBackupReminder">
          <div class="banner">⚠ Sono passati più di 7 giorni dall'ultimo backup. Ti consigliamo di esportare ora.</div>
        </template>

        <div class="section">
          <h2>Backup dati</h2>
          <p class="muted">Salva una copia completa di prodotti, scorte, movimenti e fornitori. Il PIN admin <strong>non</strong> è incluso.</p>
          <div class="flex-row" style="gap:10px;">
            <button class="btn primary" @click="doExportBackup()">⬇ Esporta backup JSON</button>
            <button class="btn" @click="triggerImport()">⬆ Importa backup JSON</button>
            <input type="file" accept="application/json" x-ref="importInput" @change="handleImport($event)" style="display:none" />
          </div>
        </div>

        <div class="section">
          <h2>PIN admin</h2>
          <p class="muted">Da 4 a 6 cifre. Modifica richiede il PIN attuale.</p>
          <button class="btn" @click="openChangePin()">Cambia PIN</button>
        </div>

        <div class="section">
          <h2>Timeout inattività</h2>
          <p class="muted">Dopo questo tempo senza attività, l'admin si blocca automaticamente. Attuale: <strong x-text="(inactivityTimeoutMs/1000).toFixed(0) + ' secondi'"></strong>.</p>
          <div class="flex-row" style="gap:10px;">
            <input type="number" :value="(inactivityTimeoutMs/1000).toFixed(0)" min="30" max="600" step="10"
                   @change="updateTimeout($event.target.value)"
                   style="background:var(--bg-elev-2);border:1px solid var(--line);color:var(--text);padding:10px 14px;border-radius:10px;width:120px;outline:none;font-family:var(--font-mono);" />
            <span class="muted">secondi (min 30, max 600)</span>
          </div>
        </div>

        <div class="section">
          <h2>Aggiornamento app</h2>
          <p class="muted">Se hai modificato i file e vuoi forzare il reload pulendo la cache.</p>
          <button class="btn" @click="forceUpdate()">↻ Forza aggiornamento</button>
        </div>

        <div class="section">
          <h2>Azzera dati</h2>
          <p class="muted">Cancella tutti i prodotti, movimenti e fornitori, e ripopola con il catalogo iniziale. <strong>PIN e impostazioni restano.</strong></p>
          <button class="btn" style="background:var(--terra);color:#fff;border-color:transparent" @click="resetAllData()">⚠ Azzera tutti i dati</button>
        </div>

        <div class="section">
          <h2>Info app</h2>
          <p class="muted">Magazzino Pizzeria Deposito Bagagli · PWA locale · v2.0<br>
          I dati sono memorizzati solo su questo iPad. Esporta regolarmente backup per non perderli.</p>
        </div>
      </div>
    </template>

  </main>

  <!-- ============================================================
       DIALOG: Quantità
       ============================================================ -->
  <template x-if="qtyDialog.open">
    <div class="overlay" @click.self="qtyCancel()">
      <div class="dialog">
        <h2 x-text="qtyDialog.product?.name"></h2>
        <div class="sub">
          <span x-text="qtyDialog.mode === 'out' ? 'Quante unità sono uscite?' : 'Quante unità sono entrate?'"></span>
          ·
          <span class="muted">scorta attuale <strong x-text="qtyDialog.product?.currentStock"></strong></span>
        </div>

        <div class="qty-mode-switch">
          <button :class="{ active: qtyDialog.mode === 'out', out: true }" @click="qtyDialog.mode = 'out'">↓ Uscita</button>
          <button :class="{ active: qtyDialog.mode === 'in', in: true }"  @click="qtyDialog.mode = 'in'">↑ Ingresso</button>
        </div>

        <div class="qty-display" :class="qtyDialog.mode">
          <span class="sign" x-text="qtyDialog.mode === 'out' ? '−' : '+'"></span><span x-text="qtyDialog.qty"></span>
          <span class="qty-unit" x-text="qtyDialog.product?.unit"></span>
        </div>

        <div class="qty-grid">
          <button @click="qtySet(1)">1</button>
          <button @click="qtySet(2)">2</button>
          <button @click="qtySet(3)">3</button>
          <button @click="qtySet(5)">5</button>
          <button @click="qtySet(10)">10</button>
          <button @click="qtySet(20)">20</button>
          <button @click="qtySet(50)">50</button>
          <button @click="qtySet(100)">100</button>
          <button class="step-down" @click="qtyAdd(-5)">−5</button>
          <button class="step-down" @click="qtyAdd(-1)">−1</button>
          <button class="step-up" @click="qtyAdd(1)">+1</button>
          <button class="step-up" @click="qtyAdd(5)">+5</button>
          <button class="step-up" @click="qtyAdd(10)">+10</button>
        </div>

        <div class="qty-actions">
          <button class="btn" @click="qtyCancel()">Annulla</button>
          <button class="btn" :class="qtyDialog.mode === 'out' ? 'danger' : 'ok'" @click="qtyConfirm()">
            Conferma <span x-text="qtyDialog.mode === 'out' ? 'uscita' : 'ingresso'"></span>
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       DIALOG: Gestione categorie
       ============================================================ -->
  <template x-if="categoryManager.open">
    <div class="overlay" @click.self="closeCategoryManager()">
      <div class="dialog" style="max-width:560px">
        <h2>Gestisci categorie</h2>
        <p class="muted" style="margin:-6px 0 14px">Tieni premuto ⋮⋮ per riordinare. Rinomina, cambia emoji o elimina.</p>

        <div class="cat-manager-list">
          <template x-for="cat in categories" :key="cat.id">
            <div class="cat-manager-row" :data-cat-id="cat.id">
              <span class="drag-handle" title="Trascina">⋮⋮</span>
              <span class="cat-manager-icon" x-text="cat.icon || '📦'"></span>
              <span class="cat-manager-name" x-text="cat.name"></span>
              <span class="cat-manager-count muted" x-text="(products.filter(p => p.category === cat.id && !p.archived).length) + ' prodotti'"></span>
              <button class="btn small" @click="openEditCategory(cat)">Modifica</button>
              <button class="btn small danger" @click="deleteCategory(cat)">Elimina</button>
            </div>
          </template>
        </div>

        <div class="flex-row" style="margin-top:18px;gap:10px;">
          <button class="btn primary" @click="openNewCategory()">+ Nuova categoria</button>
          <button class="btn" style="margin-left:auto" @click="closeCategoryManager()">Chiudi</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       DIALOG: Nuova/modifica categoria
       ============================================================ -->
  <template x-if="categoryDialog.open">
    <div class="overlay" @click.self="categoryDialog.open = false">
      <div class="dialog" style="max-width:440px">
        <h2>
          <span x-show="categoryDialog.isNew">Nuova categoria</span>
          <span x-show="!categoryDialog.isNew">Modifica categoria</span>
        </h2>
        <div class="form-grid">
          <label>
            <span>Nome</span>
            <input type="text" x-model="categoryDialog.form.name" placeholder="es. Cucina" />
          </label>
          <label>
            <span>Emoji / Icona</span>
            <input type="text" x-model="categoryDialog.form.icon" maxlength="4" placeholder="🍕" />
          </label>
        </div>
        <div class="flex-row" style="gap:10px;margin-top:14px;">
          <button class="btn" @click="categoryDialog.open = false">Annulla</button>
          <button class="btn primary" @click="saveCategory()">Salva</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       DIALOG: PIN
       ============================================================ -->
  <template x-if="pinDialog.open">
    <div class="overlay" @click.self="!setupMode && pinCancel()">
      <div class="dialog" style="max-width:400px">
        <h2>
          <template x-if="pinDialog.mode === 'setup' && pinDialog.step === 1">Imposta PIN admin</template>
          <template x-if="pinDialog.mode === 'setup' && pinDialog.step === 2">Conferma PIN</template>
          <template x-if="pinDialog.mode === 'login'">Sblocca admin</template>
          <template x-if="pinDialog.mode === 'change' && pinDialog.step === 1">PIN attuale</template>
          <template x-if="pinDialog.mode === 'change' && pinDialog.step === 2">Nuovo PIN</template>
          <template x-if="pinDialog.mode === 'change' && pinDialog.step === 3">Conferma nuovo PIN</template>
        </h2>
        <div class="sub">
          <template x-if="pinDialog.mode === 'setup'">Scegli un PIN da 4 a 6 cifre. Servirà per vedere i prezzi e accedere alle impostazioni.</template>
          <template x-if="pinDialog.mode === 'login'">Inserisci il PIN per vedere i prezzi.</template>
          <template x-if="pinDialog.mode === 'change'">Cambio PIN admin</template>
        </div>
        <div class="pin-display">
          <template x-for="i in 6" :key="i">
            <span class="dot" :class="{ filled: (pinDialog.step === 1 ? pinDialog.value : pinDialog.confirm).length >= i }"></span>
          </template>
        </div>
        <div class="pin-error" x-text="pinDialog.error"></div>
        <div class="pin-grid">
          <template x-for="d in [1,2,3,4,5,6,7,8,9]" :key="d">
            <button @click="pinDigit(d)" x-text="d"></button>
          </template>
          <button @click="pinClear()" style="font-size:14px;color:var(--text-dim)">Cancella</button>
          <button @click="pinDigit(0)">0</button>
          <button @click="pinBackspace()" style="font-size:22px">⌫</button>
        </div>
        <div class="qty-actions" style="margin-top:14px;">
          <button class="btn" @click="pinCancel()" x-show="!setupMode">Annulla</button>
          <button class="btn primary" @click="pinSubmit()">OK</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       DIALOG: Prodotto
       ============================================================ -->
  <template x-if="productDialog.open">
    <div class="overlay" @click.self="productDialog.open = false">
      <div class="dialog wide">
        <h2 x-text="productDialog.isNew ? 'Nuovo prodotto' : 'Modifica prodotto'"></h2>
        <div class="form-grid">
          <label class="full">Nome
            <input type="text" x-model="productDialog.form.name" placeholder="es. Gin Mare" />
          </label>
          <label>Categoria
            <select x-model="productDialog.form.category">
              <template x-for="c in categories" :key="c.id">
                <option :value="c.id" x-text="c.name"></option>
              </template>
            </select>
          </label>
          <label>Unità
            <select x-model="productDialog.form.unit">
              <template x-for="u in ['bottiglia','cassetta','fusto','bombola','lattina','kg','pz']" :key="u">
                <option :value="u" x-text="u"></option>
              </template>
            </select>
          </label>
          <label>Scorta attuale
            <input type="number" x-model.number="productDialog.form.currentStock" min="0" step="0.5" />
          </label>
          <label>Soglia minima
            <input type="number" x-model.number="productDialog.form.minThreshold" min="0" />
          </label>
          <template x-if="adminUnlocked">
            <label>Prezzo costo (€)
              <input type="number" x-model.number="productDialog.form.costPrice" min="0" step="0.01" />
            </label>
          </template>
          <template x-if="adminUnlocked">
            <label>Prezzo vendita (€)
              <input type="number" x-model.number="productDialog.form.salePrice" min="0" step="0.01" />
            </label>
          </template>
          <label class="full">Fornitore (opzionale)
            <select x-model="productDialog.form.supplierId">
              <option value="">— nessuno —</option>
              <template x-for="s in suppliers" :key="s.id">
                <option :value="s.id" x-text="s.name"></option>
              </template>
            </select>
          </label>
        </div>
        <div class="dialog-actions">
          <template x-if="!productDialog.isNew">
            <button class="btn danger" style="margin-right:auto" @click="archiveProduct(productDialog.original)">Archivia</button>
          </template>
          <button class="btn" @click="productDialog.open = false">Annulla</button>
          <button class="btn primary" @click="saveProduct()">Salva</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       DIALOG: Fornitore
       ============================================================ -->
  <template x-if="supplierDialog.open">
    <div class="overlay" @click.self="supplierDialog.open = false">
      <div class="dialog">
        <h2 x-text="supplierDialog.isNew ? 'Nuovo fornitore' : 'Modifica fornitore'"></h2>
        <div class="form-grid">
          <label class="full">Nome
            <input type="text" x-model="supplierDialog.form.name" placeholder="es. Distrib. Bevande Srl" />
          </label>
          <label>Telefono
            <input type="tel" x-model="supplierDialog.form.phone" />
          </label>
          <label>Email
            <input type="email" x-model="supplierDialog.form.email" />
          </label>
          <label class="full">Note
            <textarea x-model="supplierDialog.form.note"></textarea>
          </label>
        </div>
        <div class="dialog-actions">
          <button class="btn" @click="supplierDialog.open = false">Annulla</button>
          <button class="btn primary" @click="saveSupplier()">Salva</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       DIALOG: Conferma generica
       ============================================================ -->
  <template x-if="confirmDialog.open">
    <div class="overlay" @click.self="confirmDialog.open = false">
      <div class="dialog" style="max-width:440px">
        <h2 x-text="confirmDialog.title"></h2>
        <div class="sub" x-text="confirmDialog.message"></div>
        <div class="dialog-actions">
          <button class="btn" @click="confirmDialog.open = false">Annulla</button>
          <button class="btn" :class="confirmDialog.danger ? 'danger' : 'primary'" @click="confirmDialog.onConfirm && confirmDialog.onConfirm()">
            Conferma
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       DIALOG: Chiudi giornata
       ============================================================ -->
  <template x-if="closeConfirmOpen">
    <div class="overlay" @click.self="cancelCloseDay()">
      <div class="dialog">
        <h2>Chiudere la giornata?</h2>
        <div class="sub">
          La giornata di <strong x-text="todayLabel"></strong> verrà registrata nello storico.
          Potrai riaprirla dalla schermata di chiusura se serve.
        </div>
        <div class="splash-stats" style="margin: 14px 0 4px;">
          <div class="stat-block out">
            <span class="lbl">Uscite</span>
            <span class="val" x-text="todayStats.out"></span>
          </div>
          <div class="stat-block in">
            <span class="lbl">Ingressi</span>
            <span class="val" x-text="todayStats.in"></span>
          </div>
          <div class="stat-block warn">
            <span class="lbl">Sotto soglia</span>
            <span class="val" x-text="countLow"></span>
          </div>
        </div>
        <div class="dialog-actions">
          <button class="btn" @click="cancelCloseDay()">Annulla</button>
          <button class="btn primary" @click="confirmCloseDay()">Chiudi giornata</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       SPLASH: Giornata chiusa
       ============================================================ -->
  <template x-if="dayClosed && lastCloseSummary">
    <div class="day-splash">
      <div class="day-splash-card">
        <div class="splash-brand"><span class="pin">M</span>agazzino</div>
        <div class="splash-rule"></div>
        <div class="splash-title">Buona serata.</div>
        <div class="splash-date" x-text="formatCloseDate(lastCloseSummary.date)"></div>

        <div class="splash-stats">
          <div class="stat-block out">
            <span class="lbl">Uscite</span>
            <span class="val" x-text="lastCloseSummary.out"></span>
          </div>
          <div class="stat-block in">
            <span class="lbl">Ingressi</span>
            <span class="val" x-text="lastCloseSummary.in"></span>
          </div>
          <div class="stat-block warn">
            <span class="lbl">Sotto soglia</span>
            <span class="val" x-text="lastCloseSummary.lowCount"></span>
          </div>
        </div>

        <div class="splash-foot">
          La giornata è registrata nello storico.<br>
          Domani mattina l'app si apre da sola con i contatori a zero.
        </div>

        <div class="splash-actions">
          <button class="btn primary" @click="startNewDay()">Apri nuova giornata</button>
        </div>
        <div style="margin-top: 14px; text-align: center;">
          <a style="font-family: var(--font-display); font-style: italic; color: var(--text-mute); font-size: 13px; cursor: pointer; text-decoration: underline;"
             @click="undoCloseDay()">… o annulla la chiusura (resta sulla stessa giornata)</a>
        </div>
      </div>
    </div>
  </template>

  <!-- ============================================================
       TOAST ZONE
       ============================================================ -->
  <div class="toast-zone">
    <template x-for="t in toasts" :key="t.id">
      <div class="toast" :class="t.kind">
        <div class="msg">
          <span class="qty" x-text="t.qtyLabel"></span> · <span class="name" x-text="t.productName"></span>
        </div>
        <button class="undo" x-show="t.movementId" @click="undoToast(t)">Annulla</button>
        <button class="close" @click="_dismissToast(t.id)">✕</button>
      </div>
    </template>
  </div>

</div><!-- /#app -->

<!-- ============ Scripts ============ -->
<script type="module">
  import { initApp } from './js/app.js';
  document.addEventListener('alpine:init', () => {
    window.Alpine.data('app', initApp);
  });
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</body>
</html>
